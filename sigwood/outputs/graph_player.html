<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>sigwood · graph</title>
<style>
/* ---- theme tokens (sigwood html-report surfaces; validated categorical
       palette per mode - node identity is always direct-labeled) ---------- */
:root {
  --bg: #ffffff; --fg: #1f2933; --muted: #677181; --border: #d7dde4;
  --panel: #f6f8fa; --accent: #2a78d6; --clock: #0a6e2e; --wordmark: #8a5320;
  --s1:#2a78d6; --s2:#1baf7a; --s3:#eda100; --s4:#008300;
  --s5:#4a3aa7; --s6:#e34948; --s7:#e87ba4; --s8:#eb6834;
  --sx1:#8a94a3; --sx2:#6b7686; --sother:#0d9f9f;
  --halo: rgba(255,255,255,.82); --panelglass: rgba(246,248,250,.72);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #14181d; --fg: #e6eaef; --muted: #9aa4b1; --border: #2a3038;
    --panel: #1a2027; --accent: #3987e5; --clock: #7dff58; --wordmark: #e38e30;
    --s1:#3987e5; --s2:#199e70; --s3:#c98500; --s4:#008300;
    --s5:#9085e9; --s6:#e66767; --s7:#d55181; --s8:#d95926;
    --sx1:#5c6673; --sx2:#79848f; --sother:#38c0c0;
    --halo: rgba(20,24,29,.85); --panelglass: rgba(26,32,39,.72);
  }
}
:root[data-theme="light"] {
  --bg: #ffffff; --fg: #1f2933; --muted: #677181; --border: #d7dde4;
  --panel: #f6f8fa; --accent: #2a78d6; --clock: #0a6e2e; --wordmark: #8a5320;
  --s1:#2a78d6; --s2:#1baf7a; --s3:#eda100; --s4:#008300;
  --s5:#4a3aa7; --s6:#e34948; --s7:#e87ba4; --s8:#eb6834;
  --sx1:#8a94a3; --sx2:#6b7686; --sother:#0d9f9f;
  --halo: rgba(255,255,255,.82); --panelglass: rgba(246,248,250,.72);
}
:root[data-theme="dark"] {
  --bg: #14181d; --fg: #e6eaef; --muted: #9aa4b1; --border: #2a3038;
  --panel: #1a2027; --accent: #3987e5; --clock: #7dff58; --wordmark: #e38e30;
  --s1:#3987e5; --s2:#199e70; --s3:#c98500; --s4:#008300;
  --s5:#9085e9; --s6:#e66767; --s7:#d55181; --s8:#d95926;
  --sx1:#5c6673; --sx2:#79848f; --sother:#38c0c0;
  --halo: rgba(20,24,29,.85); --panelglass: rgba(26,32,39,.72);
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0; background: var(--bg); color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  display: flex; flex-direction: column; overflow: hidden;
}
.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
header {
  display: grid; grid-template-columns: auto minmax(0, 1fr); align-items: start; gap: 18px;
  border-bottom: 1px solid var(--border);
  padding: 10px 18px 8px 18px;
}
.hleft {
  display: grid; grid-template-columns: auto auto; justify-content: start;
  align-items: center; column-gap: 11px; row-gap: 3px;
}
header .mark {
  display: flex; align-items: center; gap: 5px;
  grid-column: 1; grid-row: 1;
  font-size: 17px; font-weight: 700; letter-spacing: .2px;
}
header .mark .dim { color: var(--muted); font-weight: 400; }
header .mark .wm {
  font-family: Georgia, "Bookman Old Style", "Times New Roman", serif;
  font-size: 18px; color: var(--wordmark);
}
.kind-chip {
  display: inline-flex; align-items: center; min-height: 22px; padding: 0 6px;
  grid-column: 2; grid-row: 1; justify-self: start;
  border: 1.5px solid var(--accent); border-radius: 5px;
  background: rgba(42,120,214,.10); color: var(--accent);
  font: 700 17px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
}
/* The data clock gets top billing. */
#bigclock {
  display: flex; align-items: center; gap: 11px; white-space: nowrap;
  grid-column: 1; grid-row: 2;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
}
#bc-time {
  font-size: 30px; font-weight: 700; color: var(--clock); line-height: 1.05;
  letter-spacing: 1.5px; font-variant-numeric: tabular-nums;
}
#bc-cal {
  display: flex; flex-direction: column; grid-column: 2; grid-row: 2;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  line-height: 1.12;
}
#bc-day { font-size: 16px; font-weight: 600; color: var(--clock); letter-spacing: .3px; }
#bc-sub { font-size: 11.5px; color: var(--muted); letter-spacing: .6px; }
.readout { min-width: 0; padding-top: 2px; }
.readout-grid {
  display: grid;
  grid-template-columns: max-content minmax(160px,3fr)
    repeat(3,minmax(78px,auto)) minmax(120px,1fr);
  gap: 6px 14px;
}
.readout-cell { min-width: 0; }
.readout-label {
  display: block; color: var(--muted); font-size: 9.5px; font-weight: 650;
  letter-spacing: .65px; line-height: 1.15; text-transform: uppercase;
}
.readout-value { display: block; margin-top: 2px; font-size: 12px; line-height: 1.2; }
.readout-value[hidden], .readout-sub[hidden] { display: none; }
.readout-clip { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.readout-sub {
  display: block; margin-top: 2px; overflow: hidden; text-overflow: ellipsis;
  color: var(--muted); font-size: 10px; line-height: 1.2; white-space: nowrap;
}
.window-stack { display: flex; flex-direction: column; gap: 1px; }
.readout-foot {
  display: flex; align-items: center; gap: 6px; min-width: 0;
  margin-top: 6px; color: var(--muted); font-size: 10.5px;
}
.readout-foot[hidden] { display: none; }
.copy-hunt {
  border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px;
  background: var(--panel); color: var(--muted); cursor: pointer;
  font: 600 10px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace;
}
.copy-hunt:hover, .copy-hunt:focus-visible { border-color: var(--accent); color: var(--accent); }
@media (max-width: 900px) {
  header { grid-template-columns: 1fr; gap: 8px; }
  .readout-grid { grid-template-columns: repeat(3,minmax(0,1fr)); }
  .readout-cell.window { grid-column: span 2; }
}
#stage { position: relative; flex: 1; min-height: 0; }
#sankey { position: absolute; inset: 0; width: 100%; height: 100%; display: block; cursor: default; }
#tooltip {
  position: fixed; pointer-events: none; z-index: 10; display: none;
  background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
  padding: 7px 10px; font-size: 12px; line-height: 1.5;
  box-shadow: 0 4px 14px rgba(0,0,0,.25); max-width: 360px;
}
#tooltip .t1 { font-weight: 600; }
#tooltip .t2 { color: var(--muted); }
/* ---- ranked entity panel (filter surface; draggable, translucent) ---- */
#rank {
  position: absolute; top: 10px; right: 12px; z-index: 5; width: 258px;
  background: var(--panelglass); backdrop-filter: blur(5px);
  border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  font-size: 11.5px;
}
#rank-head { display: flex; align-items: center; gap: 6px; padding: 6px 8px; cursor: grab; touch-action: none; }
#rank-head:active { cursor: grabbing; }
#rank-head .spacer { flex: 1; }
#rank-rows { position: relative; margin: 0 6px 6px 6px; }
.rrow {
  position: absolute; left: 0; right: 0; height: 21px;
  display: flex; align-items: center; gap: 6px; padding: 0 4px;
  transition: transform .35s ease, opacity .3s ease; border-radius: 4px;
}
.rrow .sw { width: 9px; height: 9px; border-radius: 2px; flex: none; }
.rrow .nm {
  flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  cursor: pointer; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
}
.rrow .rt { color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 10.5px; }
.rrow .ex { cursor: pointer; color: var(--muted); border: 0; background: none; font-size: 12px; padding: 0 2px; }
.rrow .ex:hover { color: var(--fg); }
.rrow.excluded { opacity: .38; }
.rrow.excluded .nm { text-decoration: line-through; }
.rrow.only .nm { color: var(--accent); font-weight: 700; }
.rrow .nm:hover { text-decoration: underline; }
#rank.collapsed #rank-rows, #rank.collapsed .seg { display: none; }
#rank button.mini {
  border: 0; background: none; color: var(--muted); cursor: pointer; padding: 0 4px; font-size: 12px;
}
#rank button.mini:hover { color: var(--fg); }
#timeline { height: 78px; margin: 0 18px; position: relative; }
#tl { width: 100%; height: 100%; display: block; cursor: ew-resize; }
#controls {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 8px 18px; font-size: 12.5px; color: var(--muted);
}
#controls .grp { display: flex; align-items: center; gap: 6px; }
#controls .sep { width: 1px; height: 18px; background: var(--border); }
button, select {
  font: inherit; color: var(--fg); background: var(--panel);
  border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px;
  cursor: pointer;
}
button:hover { border-color: var(--accent); }
button.play { min-width: 44px; font-weight: 700; }
#speed { min-width: 84px; }
.seg { display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.seg button { border: 0; border-radius: 0; background: transparent; color: var(--muted); padding: 3px 8px; }
.seg button.on { background: var(--accent); color: #fff; }
input[type=range] { accent-color: var(--accent); width: 110px; }
#winlabel { display: inline-block; min-width: 52px; }  /* fixed width: no reflow jiggle */
#stats {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(32px, 1fr));
  gap: 8px; padding: 4px 18px 14px 18px;
}
.tile {
  background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 10px; min-width: 0; grid-column: span 3;
}
.tile.w-med { grid-column: span 4; }
.tile.w-wide { grid-column: span 5; }
.tile .k {
  font-size: 10.5px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tile .v { font-size: 14.5px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
@media (max-width: 560px) {
  #stats { grid-template-columns: repeat(2,minmax(0,1fr)); }
  .tile, .tile.w-med, .tile.w-wide { grid-column: auto; }
}
#fps { position: fixed; right: 8px; bottom: 8px; font-size: 11px; color: var(--muted); display: none; z-index: 20; }
#filterbadge { display: none; color: var(--accent); font-weight: 600; }
</style>
</head>
<body>
<header>
  <div class="hleft">
    <div class="mark"><span class="wm">sigwood</span><span class="dim">·</span><span>graph</span></div>
    <span class="kind-chip" id="meta-kind"></span>
    <div id="bigclock"><span id="bc-time">-:-:-</span></div>
    <span id="bc-cal"><span id="bc-day"></span><span id="bc-sub"></span></span>
  </div>
  <div class="readout">
    <div class="readout-grid">
      <div class="readout-cell window"><span class="readout-label" id="meta-window-label">window</span><span class="readout-value window-stack mono"><span id="meta-window-start"></span><span id="meta-window-end"></span></span></div>
      <div class="readout-cell source"><span class="readout-label">source</span><span class="readout-value readout-clip mono" id="meta-source"></span><span class="readout-sub mono" id="meta-source-dir"></span></div>
      <div class="readout-cell"><span class="readout-label">records</span><span class="readout-value mono" id="meta-count"></span></div>
      <div class="readout-cell" id="meta-entities-cell"><span class="readout-label">entities</span><span class="readout-value mono" id="meta-entities"></span></div>
      <div class="readout-cell"><span class="readout-label">bin</span><span class="readout-value mono" id="meta-bin"></span></div>
      <div class="readout-cell" id="meta-derivation-cell"><span class="readout-label" id="meta-derivation-label">derivation</span><span class="readout-value" id="meta-derivation"></span><span class="readout-sub" id="meta-degrade"></span><span class="readout-sub" id="meta-band-loss"></span><span class="readout-sub" id="meta-straddler"></span><span class="readout-sub" id="meta-clip-loss"></span></div>
    </div>
    <div class="readout-foot" id="meta-hunt-foot">
      <button class="copy-hunt" id="copy-hunt" type="button" title="copy exact hunt command">copy hunt</button>
    </div>
  </div>
</header>

<div id="stage">
  <canvas id="sankey"></canvas>
  <div id="rank">
    <div id="rank-head">
      <span class="seg" id="ranktab">
        <button data-t="h" class="on">hosts</button><button data-t="s" id="ranktab-mid">services</button>
      </span>
      <span class="spacer"></span>
      <button class="mini" id="rankclear" style="display:none" title="clear filters">clear</button>
      <button class="mini" id="rankmin" title="collapse">-</button>
    </div>
    <div id="rank-rows"></div>
  </div>
</div>

<div id="timeline" title="drag: scrub · shift-drag: loop range · double-click: clear range"><canvas id="tl"></canvas></div>

<div id="controls">
  <div class="grp">
    <button id="play" class="play" title="space">▶</button>
    <select id="speed" title="playback speed (data time per second)"></select>
    <label><input type="checkbox" id="loop" checked> loop</label>
    <button id="clipbtn" title="download the current view (time range + filters) as a standalone clip">⬇ clip</button>
  </div>
  <div class="sep"></div>
  <div class="grp"><span>window</span>
    <input type="range" id="win" min="1" max="40" step="1">
    <span class="mono" id="winlabel"></span>
  </div>
  <div class="sep"></div>
  <div class="grp" id="metricgrp"><span>metric</span>
    <span class="seg" id="metric">
      <button data-m="b" class="on">bytes</button><button data-m="c">conns</button>
    </span>
  </div>
  <div class="grp"><span>view</span>
    <span class="seg" id="mode">
      <button data-mode="2" class="on">hosts</button><button data-mode="3" id="modemid">+services</button>
    </span>
  </div>
  <div class="grp"><span>group</span>
    <span class="seg" id="group">
      <button data-g="32" class="on">host</button><button data-g="24">/24</button>
      <button data-g="16">/16</button><button data-g="8">/8</button>
    </span>
  </div>
  <div class="grp"><span>y</span>
    <span class="seg" id="yscale">
      <button data-y="lin">lin</button><button data-y="log">log</button>
    </span>
  </div>
  <div class="grp"><span>ribbons</span>
    <span class="seg" id="fill">
      <button data-f="blend" class="on">blend</button><button data-f="split">split</button>
      <button data-f="src">src</button><button data-f="dst">dst</button>
    </span>
  </div>
  <div class="grp"><span>scale</span>
    <span class="seg" id="breathe">
      <button data-breathe="0" class="on">fill</button><button data-breathe="0.5">breathe</button>
      <button data-breathe="1">absolute</button>
    </span>
  </div>
  <div class="sep"></div>
  <div class="grp"><button id="theme" title="theme">◐</button></div>
  <div class="spacer" style="flex:1"></div>
  <div class="grp"><span id="filterbadge">filtered</span></div>
</div>

<div id="stats">
  <div class="tile w-med" id="tile-rate"><div class="k">rate</div><div class="v mono" id="st-rate">-</div></div>
  <div class="tile"><div class="k" id="k-cps">conns / s</div><div class="v mono" id="st-cps">-</div></div>
  <div class="tile w-med" id="tile-cum"><div class="k">cumulative</div><div class="v mono" id="st-cum">-</div></div>
  <div class="tile"><div class="k" id="k-conns">connections</div><div class="v mono" id="st-conns">-</div></div>
  <div class="tile"><div class="k">flows shown</div><div class="v mono" id="st-active">-</div></div>
  <div class="tile"><div class="k" id="k-hosts">hosts seen</div><div class="v mono" id="st-hosts">-</div></div>
  <div class="tile w-wide"><div class="k">top talker</div><div class="v mono" id="st-talker">-</div></div>
  <div class="tile w-wide"><div class="k" id="k-svc">top service</div><div class="v mono" id="st-svc">-</div></div>
</div>

<div id="tooltip"></div>
<div id="fps" class="mono"></div>

<script>const DATA = __SIGWOOD_GRAPH_DATA__;</script>
<script>
"use strict";
/* sigwood graph animated Sankey player.
   Smoothness architecture:
   1. frozen node order per view (layout never re-sorts between frames)
   2. centered kernel smoothing of per-flow series, edge-renormalized
   3. rAF value interpolation; geometry is a continuous function of values
   4. continuous gap/label fades + EMA'd normalization scale + animated
      filter masks (nothing ever pops)
   View model layer: the raw payload rolls up client-side by CIDR group; only/
   exclude filters apply as eased per-flow masks. A loop range (shift-drag on
   the timeline) bounds playback, and "clip" re-embeds the sliced+filtered
   payload into this page's own pristine source for a standalone artifact.   */

/* captured BEFORE any DOM mutation - the template this page re-embeds into
   when exporting a clip */
const PRISTINE = "<!doctype html>\n" + document.documentElement.outerHTML;

const M = DATA.meta;
const B = M.bins, BIN = M.bin_seconds;
const clockPart = (d, local, utc) => M.display_utc ? d[utc]() : d[local]();
const WEEKDAYS = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
function startOfDisplayDay(d) {
  if (M.display_utc) d.setUTCHours(0, 0, 0, 0);
  else d.setHours(0, 0, 0, 0);
}

/* ---------- raw payload ---------- */
function expand(pairs) {
  const a = new Float32Array(B);
  for (let i = 0; i < pairs.length; i += 2) a[pairs[i]] = pairs[i + 1];
  return a;
}
const RAW = { SRC: DATA.srcNodes, DST: DATA.dstNodes, SVC: DATA.svcNodes, FLOWS: DATA.flows };
const rawDenseB = RAW.FLOWS.map(f => expand(f.b));
const rawDenseC = RAW.FLOWS.map(f => expand(f.c));
const rawTotPerFlow = rawDenseB.map((a, i) => {
  let s = 0; for (let k = 0; k < B; k++) s += a[k];
  let c = 0; const cc = rawDenseC[i]; for (let k = 0; k < B; k++) c += cc[k];
  return s + c;
});
const totB = Float32Array.from(DATA.totB);
const totC = Float32Array.from(DATA.totC);
const cumB = new Float64Array(B + 1), cumC = new Float64Array(B + 1);
for (let i = 0; i < B; i++) { cumB[i+1] = cumB[i] + totB[i]; cumC[i+1] = cumC[i] + totC[i]; }

/* ---------- active view model (rebuilt on group change) ---------- */
let SRC, DST, SVC, FLOWS, NF, denseB, denseC;
let srcFlowOrder, dstFlowOrder, svList, vdList, hostIndex;
let rawToModel;               // raw flow index -> active model flow index
let groupLevel = 32;

const OTHER = "(other)";
const OTHER_RIBBON_DIM = 0.45, OTHER_BAR_ALPHA = 0.55;
function rollKey(id, level) {
  if (level === 32 || id === OTHER) return id;
  const m = id.match(/^(\d+)\.(\d+)\.(\d+)\.(\d+)$/);
  if (!m) return id;                       // v6 / non-IP labels stay themselves
  if (level === 24) return `${m[1]}.${m[2]}.${m[3]}.0/24`;
  if (level === 16) return `${m[1]}.${m[2]}.0.0/16`;
  return `${m[1]}.0.0.0/8`;
}

function buildModel(level) {
  groupLevel = level;
  SVC = RAW.SVC;
  if (level === 32) {
    SRC = RAW.SRC; DST = RAW.DST;
    FLOWS = RAW.FLOWS.map(f => ({ s: f.s, d: f.d, v: f.v }));
    denseB = rawDenseB; denseC = rawDenseC;
    rawToModel = Int32Array.from(RAW.FLOWS, (_, i) => i);
  } else {
    const sKey = RAW.SRC.map(n => rollKey(n.id, level));
    const dKey = RAW.DST.map(n => rollKey(n.id, level));
    const tot = new Map();
    RAW.FLOWS.forEach((f, i) => {
      tot.set(sKey[f.s], (tot.get(sKey[f.s]) || 0) + rawTotPerFlow[i]);
      tot.set(dKey[f.d], (tot.get(dKey[f.d]) || 0) + rawTotPerFlow[i]);
    });
    const rank = [...tot.keys()].filter(k => k !== OTHER)
      .sort((a, b) => tot.get(b) - tot.get(a));
    const cr = new Map(rank.map((k, i) => [k, i]));
    const sideTotals = (keys, pick) => {
      const seen = new Map();
      RAW.FLOWS.forEach((f, i) => {
        const k = keys[pick(f)];
        seen.set(k, (seen.get(k) || 0) + rawTotPerFlow[i]);
      });
      const ids = [...seen.keys()].filter(k => k !== OTHER)
        .sort((a, b) => seen.get(b) - seen.get(a));
      if (seen.has(OTHER)) ids.push(OTHER);
      return ids.map(id => ({ id, cr: cr.get(id) ?? 0 }));
    };
    SRC = sideTotals(sKey, f => f.s);
    DST = sideTotals(dKey, f => f.d);
    const sIdx = new Map(SRC.map((n, i) => [n.id, i]));
    const dIdx = new Map(DST.map((n, i) => [n.id, i]));
    // group by NUMERIC (srcNode, dstNode, svc) key - entity ids are log bytes
    // and can contain any delimiter (dns-mode mDNS names carry spaces), so a
    // string-joined key is never parse-safe
    const KD = 100000;   // > max node/svc count by construction
    const groups = new Map();
    RAW.FLOWS.forEach((f, i) => {
      const k = (sIdx.get(sKey[f.s]) * KD + dIdx.get(dKey[f.d])) * KD + f.v;
      const g = groups.get(k);
      if (g) g.push(i); else groups.set(k, [i]);
    });
    FLOWS = []; denseB = []; denseC = [];

      const w = tctx.measureText(WD[dow]).width;
      const nextLabel = idx + (labelEvery - idx % labelEvery);
      const nextDateX = x + (nextLabel - idx) * pxPer;
      if (x - w / 2 > lastRight && x + w / 2 + LABEL_GAP_PX < nextDateX) {
        tctx.textAlign = "center"; tctx.globalAlpha = 0.6;
        tctx.fillText(WD[dow], x, tlH - 11);
        tctx.textAlign = "left"; lastRight = x + w / 2;

    }
  }
  tctx.globalAlpha = 1;
  const yVals = [];
  if (yLog) {
    for (let d = Math.pow(10, Math.floor(Math.log10(peak))); d >= peak / 1000 && yVals.length < 3; d /= 10)
      if (d < peak) yVals.push(d);
  } else { yVals.push(peak / 2, peak); }
  tctx.textAlign = "left"; tctx.textBaseline = "bottom";
  for (const v of yVals) {
    const y = yOf(v, peak);
    tctx.strokeStyle = TH.border; tctx.globalAlpha = 0.6;
    tctx.beginPath(); tctx.moveTo(0, y); tctx.lineTo(tlW, y); tctx.stroke();
    tctx.globalAlpha = 1;
    tctx.fillStyle = TH.muted;
    tctx.fillText(metric === "b" ? fmtB(v / BIN) + "/s" : fmtN(v / BIN) + "/s", 3, y - 1);
  }
  // loop range (committed OR mid-gesture provisional): dim outside, bracket
  const showRange = rangeAnchor !== null ? [pendA, pendB] : rangeSet ? [loopA, loopB] : null;
  if (showRange) {
    const xa = (showRange[0] / B) * tlW, xb = (showRange[1] / B) * tlW;
    tctx.globalAlpha = 0.5; tctx.fillStyle = TH.bg;
    tctx.fillRect(0, 0, xa, tlH); tctx.fillRect(xb, 0, tlW - xb, tlH);
    tctx.globalAlpha = 1;
    tctx.strokeStyle = TH.accent; tctx.lineWidth = 1.5;
    for (const x of [xa, xb]) {
      tctx.beginPath(); tctx.moveTo(x, 0); tctx.lineTo(x, tlH); tctx.stroke();
    }
    tctx.lineWidth = 1;
  }
  tctx.strokeStyle = TH.border; tctx.strokeRect(0.5, 0.5, tlW - 1, tlH - 1);
  const px = (t / B) * tlW;
  tctx.strokeStyle = TH.fg; tctx.lineWidth = 1.5;
  tctx.beginPath(); tctx.moveTo(px, 0); tctx.lineTo(px, tlH); tctx.stroke();
  tctx.lineWidth = 1;
}

/* ---------- formats ---------- */
const fmtB = n => n < 1024 ? `${Math.round(n)} B` : n < 1048576 ? `${(n/1024).toFixed(1)} KB`
  : n < 1073741824 ? `${(n/1048576).toFixed(1)} MB`
  : `${(n/1073741824).toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2})} GB`;
const fmtN = n => {
  if (n === 0) return "0";
  if (n > 0 && n < 0.1) return "<0.1";
  if (Number.isInteger(n)) return Math.round(n).toLocaleString("en-US");
  return n.toLocaleString("en-US", {minimumFractionDigits:1, maximumFractionDigits:1});
};
const two = n => String(n).padStart(2, "0");
const fmtStamp = sec => {
  let d = new Date(sec * 1000);
  return `${clockPart(d, "getFullYear", "getUTCFullYear")}-${two(clockPart(d, "getMonth", "getUTCMonth") + 1)}-${two(clockPart(d, "getDate", "getUTCDate"))} ${two(clockPart(d, "getHours", "getUTCHours"))}:${two(clockPart(d, "getMinutes", "getUTCMinutes"))}`;
};
const TZ_LABEL = (() => {
  if (M.display_utc) return "UTC";

    const p = new Intl.DateTimeFormat(undefined, { timeZoneName: "short" })
      .formatToParts(new Date());
    return (p.find(x => x.type === "timeZoneName") || {}).value || "local";
  } catch { return "local"; }
})();
function fmtDur(sec) {
  if (sec < 60) return `${sec}s`;
  if (sec < 3600) return `${Math.round(sec/60)}m`;
  if (sec < 86400) return `${+(sec/3600).toFixed(sec % 3600 ? 1 : 0)}h`;
  return `${+(sec/86400).toFixed(sec % 86400 ? 1 : 0)}d`;
}
const $ = id => document.getElementById(id);

/* ---------- stats and data clock ---------- */
let lastStats = 0;
function stats(now) {
  if (now - lastStats < 100 || !geom) return;
  lastStats = now;
  const d = new Date(Math.min(M.t0 + t * BIN, M.t1) * 1000);
  $("bc-time").textContent = `${two(clockPart(d, "getHours", "getUTCHours"))}:${two(clockPart(d, "getMinutes", "getUTCMinutes"))}:${two(clockPart(d, "getSeconds", "getUTCSeconds"))}`;
  $("bc-day").textContent = WEEKDAYS[clockPart(d, "getDay", "getUTCDay")];
  $("bc-sub").textContent =
    `${clockPart(d, "getFullYear", "getUTCFullYear")}-${two(clockPart(d, "getMonth", "getUTCMonth")+1)}-${two(clockPart(d, "getDate", "getUTCDate"))} · ${TZ_LABEL}`;
  let rB = 0, rC = 0;
  for (let i = 0; i < NF; i++) {
    rB += valAt(smB[i], t) * maskC[i];
    rC += valAt(smC[i], t) * maskC[i];
  }
  $("st-rate").textContent = fmtB(rB / BIN) + "/s";
  const cps = rC / BIN;
  $("st-cps").textContent = fmtN(cps);
  // odometer tiles read the FILTERED cumulative sums (equal to the raw sums
  // when no filter is active), so every aggregate surface shares one basis
  const i0 = Math.min(Math.floor(t), B - 1), fr = t - i0;
  const cB = fCum.b || cumB, cC = fCum.c || cumC;
  const tB = fTot.b || totB, tC = fTot.c || totC;
  $("st-cum").textContent = fmtB(cB[i0] + fr * tB[i0]);
  const nConns = cC[i0] + fr * tC[i0];
  $("st-conns").textContent = fmtN(M.weighted ? nConns : Math.floor(nConns));
  let act = 0;
  for (let i = 0; i < NF; i++) if (geom.fv[i] * geom.S >= 0.4) act++;
  $("st-active").textContent = fmtN(act);
  // hosts-seen stays a whole-capture census (pre-fold fact) - say so when a
  // filter makes the rest of the row filtered
  const anyFilter = onHosts.size || exHosts.size || onSvc.size || exSvc.size;
  $("st-hosts").textContent =
    (DATA.hostsSeen ? fmtN(DATA.hostsSeen[i0]) : "-") + (anyFilter ? " (all)" : "");
  const eps = peakRate[metric] * 1e-4;
  let bi = -1, bv = 0;
  geom.sVal.forEach((v, i) => { if (v > bv) { bv = v; bi = i; } });
  $("st-talker").textContent = bi >= 0 && bv > eps
    ? `${SRC[bi].id} · ${Math.round(100 * bv / Math.max(geom.total, 1e-9))}%` : "-";
  let si = -1, sv = 0;
  geom.vVal.forEach((v, i) => { if (v > sv) { sv = v; si = i; } });
  $("st-svc").textContent = si >= 0 && sv > eps
    ? `${SVC[si]} · ${Math.round(100 * sv / Math.max(geom.total, 1e-9))}%` : "-";
}

/* ---------- ranked entity panel (animated, click-to-filter, draggable) -- */
const ROWH = 21, RANK_N = 12;

  if (!geom) return [];

  if (rankTab === "h") {
    for (const [id, e] of hostIndex) {
      if (id === OTHER) continue;
      const v = (e.si >= 0 ? geom.sVal[e.si] : 0) + (e.di >= 0 ? geom.dVal[e.di] : 0);
      ent.set(id, { v, color: entColor(e.si >= 0 ? SRC[e.si] : DST[e.di]) });
    }

    SVC.forEach((id, i) => {

  const list = [...ent.entries()].sort((a, b) => b[1].v - a[1].v).slice(0, RANK_N);
  for (const id of [...onSet, ...exSet])

}
function updateRank(now) {

  const seen = new Set();
  list.forEach(([id, e], idx) => {

    let row = rankRows.get(id);
    if (!row) {
      row = document.createElement("div");
      row.className = "rrow";
      const sw = document.createElement("span"); sw.className = "sw";
      const nm = document.createElement("span"); nm.className = "nm"; nm.textContent = id;
      nm.title = "click: only this";
      const rt = document.createElement("span"); rt.className = "rt";
      const ex = document.createElement("button"); ex.className = "ex"; ex.textContent = "✕";
      ex.title = "exclude";
      nm.addEventListener("click", () => { toggleSet(onSet, id); rebuildMask(); lastRank = 0; });
      ex.addEventListener("click", () => { toggleSet(exSet, id); rebuildMask(); lastRank = 0; });
      row.append(sw, nm, rt, ex);
      row.style.transform = `translateY(${idx * ROWH}px)`;
      holder.appendChild(row);
      rankRows.set(id, row);
    }
    row.querySelector(".sw").style.background = e.color;
    row.querySelector(".rt").textContent =
      metric === "b" ? fmtB(e.v / BIN) + "/s" : fmtN(e.v / BIN) + "/s";
    row.style.transform = `translateY(${idx * ROWH}px)`;
    row.classList.toggle("excluded", exSet.has(id));
    row.classList.toggle("only", onSet.has(id));

}
function toggleSet(set, id) { set.has(id) ? set.delete(id) : set.add(id); }
function clearRank() { rankRows.forEach(r => r.remove()); rankRows.clear(); }

(() => {

/* ---------- clip export: re-embed a sliced+filtered payload into this
              page's own pristine source ---------- */
function downloadClip() {
  const a = rangeSet ? Math.floor(loopA) : 0;
  const b = rangeSet ? Math.min(B, Math.max(a + 1, Math.ceil(loopB))) : B;
  const nb = b - a;
  const flows = [];
  const usedS = new Set(), usedD = new Set(), usedV = new Set();
  const ntotB = new Float64Array(nb), ntotC = new Float64Array(nb);
  let ownBefore = 0, ownAfter = 0;
  RAW.FLOWS.forEach((f, i) => {
    if (maskT[rawToModel[i]] < 0.5) return;   // bake current filters
    const db = rawDenseB[i], dc = rawDenseC[i];
    const pb = [], pc = [];
    if (M.bands_active === true) {
      for (let x = 0; x < a; x++) ownBefore += db[x];
      for (let x = b; x < B; x++) ownAfter += db[x];
    }
    for (let x = a; x < b; x++) {
      if (db[x]) { pb.push(x - a, db[x]); ntotB[x-a] += db[x]; }
      if (dc[x]) { pc.push(x - a, dc[x]); ntotC[x-a] += dc[x]; }
    }
    if (!pb.length && !pc.length) return;
    flows.push({ s: f.s, d: f.d, v: f.v, b: pb, c: pc });
    usedS.add(f.s); usedD.add(f.d); usedV.add(f.v);
  });
  if (!flows.length) {
    const btn = $("clipbtn");
    btn.textContent = "empty range";
    setTimeout(() => { btn.textContent = "⬇ clip"; }, 1400);   // restore to the constant label
    return;
  }
  const remap = used => {
    const keep = [...used].sort((x, y) => x - y);
    return [keep, new Map(keep.map((o, n) => [o, n]))];
  };
  // hosts remap (they carry a baked color rank, so pruning is color-safe);
  // services keep the FULL list - svcColor is index-keyed, and compacting
  // the list would repaint every surviving service in the clip
  const [sKeep, sMap] = remap(usedS), [dKeep, dMap] = remap(usedD);
  flows.forEach(f => { f.s = sMap.get(f.s); f.d = dMap.get(f.d); });
  let rows = 0; for (const v of ntotC) rows += v;
  const validLoss = value => typeof value === "number" && Number.isFinite(value) && value >= 0
    ? Math.round(value) : 0;
  const inherited = M.clip_loss && typeof M.clip_loss === "object"
    ? validLoss(validLoss(M.clip_loss.prior_bytes) +
      validLoss(M.clip_loss.own_before) + validLoss(M.clip_loss.own_after))
    : 0;
  const clipLoss = M.bands_active === true ? {
    prior_bytes: inherited,
    own_before: Math.max(0, Math.round(ownBefore)),
    own_after: Math.max(0, Math.round(ownAfter)),
  } : null;
  const clipParts = [];
  if (clipLoss && clipLoss.own_before) clipParts.push(`${fmtB(clipLoss.own_before)} before`);
  if (clipLoss && clipLoss.own_after) clipParts.push(`${fmtB(clipLoss.own_after)} after`);
  let clipLossNote = clipParts.length
    ? `clip excludes ${clipParts.join(" and ")} its window`
    : null;
  if (clipLoss && clipLoss.prior_bytes) {
    const ancestor = `ancestor clips excluded a further ${fmtB(clipLoss.prior_bytes)} within the source window`;
    clipLossNote = clipLossNote ? `${clipLossNote}; ${ancestor}` : ancestor;
  }
  const sourceBandLoss = typeof M.band_loss_note === "string" && M.band_loss_note
    ? (M.band_loss_scoped === true
      ? M.band_loss_note
      : `source window: ${M.band_loss_note}`)
    : null;
  const payload = {
    meta: { ...M,
      source: (M.source || "").replace(/ · clip$/, "") + " · clip",
      rows, clip: true,
      t0: M.t0 + a * BIN, t1: Math.min(M.t1, M.t0 + b * BIN), bins: nb,
      distinct_hosts: null,
      ...(sourceBandLoss ? {
        band_loss_note: sourceBandLoss, band_loss_scoped: true,
      } : {}),
      ...(clipLoss ? { clip_loss: clipLoss } : {}),
      clip_loss_note: clipLossNote,
      generated_utc: new Date().toISOString().slice(0, 16).replace("T", " ") + " UTC",
    },
    srcNodes: sKeep.map(o => RAW.SRC[o]),
    dstNodes: dKeep.map(o => RAW.DST[o]),
    svcNodes: RAW.SVC,
    flows,
    totB: [...ntotB], totC: [...ntotC],
    hostsSeen: null,   // pre-fold host census can't be re-derived client-side
  };
  const blob = JSON.stringify(payload).replace(/</g, "\\u003c");
  const marker = "const DATA" + " = ";
  const idx = PRISTINE.indexOf(marker);           // data script precedes this one
  const end = PRISTINE.indexOf(";</scr" + "ipt>", idx);
  const html = PRISTINE.slice(0, idx + marker.length) + blob + PRISTINE.slice(end);
  const d = new Date(payload.meta.t0 * 1000);
  const name = `sigwood-graph_clip_${clockPart(d, "getFullYear", "getUTCFullYear")}${two(clockPart(d, "getMonth", "getUTCMonth")+1)}${two(clockPart(d, "getDate", "getUTCDate"))}` +
               `-${two(clockPart(d, "getHours", "getUTCHours"))}${two(clockPart(d, "getMinutes", "getUTCMinutes"))}.html`;
  const url = URL.createObjectURL(new Blob([html], { type: "text/html" }));
  const link = document.createElement("a");
  link.href = url; link.download = name; link.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}
$("clipbtn").addEventListener("click", downloadClip);

/* ---------- hit testing (analytic - no picking buffer) ---------- */
function bezY(y0, y1, u) {
  const v = 1 - u;
  return y0 * (v*v*v + 3*v*v*u) + y1 * (3*v*u*u + u*u*u);
}
function solveU(x0, x1, px) {
  const cx = (x0 + x1) / 2;
  let lo = 0, hi = 1;
  for (let k = 0; k < 18; k++) {
    const u = (lo + hi) / 2, v = 1 - u;
    const x = x0*v*v*v + 3*cx*v*v*u + 3*cx*v*u*u + x1*u*u*u;
    if (x < px) lo = u; else hi = u;
  }
  return (lo + hi) / 2;
}
function hitTest(px, py) {
  if (!geom) return null;
  const g = geom;
  const xL = PAD_X, xR = W - PAD_X - NW, xM = (xL + xR + NW) / 2 - NW / 2;
  function nodeHit(nodes, vals, col, x, kind) {
    if (px < x - 2 || px > x + NW + 2) return null;
    for (let i = 0; i < nodes.length; i++) {
      const h = vals[i] * g.S;
      if (h >= 0.5 && py >= col.ys[i] && py <= col.ys[i] + h) return { kind, i };
    }
    return null;
  }
  let n = nodeHit(SRC, g.sVal, g.L, xL, "src") || nodeHit(DST, g.dVal, g.R, xR, "dst")
       || (mode === 3 && nodeHit(SVC, g.vVal, g.Mid, xM, "svc"));
  if (n) {
    const flows = new Set();
    FLOWS.forEach((f, i) => {
      if ((n.kind === "src" && f.s === n.i) || (n.kind === "dst" && f.d === n.i) ||
          (n.kind === "svc" && f.v === n.i)) flows.add(i);
    });
    return { ...n, flows };
  }
  function ribbonHit(x0, x1, list, vals, y0f, y1f) {
    if (px <= x0 || px >= x1) return null;
    const u = solveU(x0, x1, px);
    for (let k = list.length - 1; k >= 0; k--) {
      const h = vals(k) * g.S;
      if (h < 0.4) continue;
      const yt = bezY(y0f(k), y1f(k), u);
      if (py >= yt && py <= yt + h) return k;
    }
    return null;
  }
  if (mode === 2) {
    const k = ribbonHit(xL + NW, xR,
      FLOWS, i => g.fv[i],
      i => g.L.ys[FLOWS[i].s] + g.offS[i], i => g.R.ys[FLOWS[i].d] + g.offD[i]);
    if (k !== null) return { kind: "flow", i: k, flows: new Set([k]) };
  } else {
    const lk = g.links;
    let k = ribbonHit(xL + NW, xM, svList, k2 => lk.lv[k2],
      k2 => g.L.ys[svList[k2].s] + lk.offLs[k2], k2 => g.Mid.ys[svList[k2].v] + lk.offLv[k2]);
    if (k !== null) return { kind: "sv", i: k, flows: new Set(svList[k].idxs) };
    k = ribbonHit(xM + NW, xR, vdList, k2 => lk.rv[k2],
      k2 => g.Mid.ys[vdList[k2].v] + lk.offRv[k2], k2 => g.R.ys[vdList[k2].d] + lk.offRd[k2]);
    if (k !== null) return { kind: "vd", i: k, flows: new Set(vdList[k].idxs) };
  }
  return null;
}

/* ---------- tooltip ---------- */
const tip = $("tooltip");

function tipFor(h, ev) {
  const g = geom, rate = v => (metric === "b" ? fmtB(v / BIN) + "/s" : fmtN(v / BIN) + "/s");
  if (h.kind === "flow") {
    const f = FLOWS[h.i];

  } else if (h.kind === "sv") {

  } else if (h.kind === "vd") {

  } else {
    const id = h.kind === "src" ? SRC[h.i].id : h.kind === "dst" ? DST[h.i].id : SVC[h.i];
    const v = (h.kind === "src" ? g.sVal : h.kind === "dst" ? g.dVal : g.vVal)[h.i];
    const share = g.total > 0 ? ` · ${(100 * v / g.total).toFixed(1)}% of window` : "";

/* ---------- playback loop ---------- */
let lastFrame = 0, frames = 0, fpsT = 0;

function tick(now) {
  const dt = Math.min(lastFrame ? (now - lastFrame) / 1000 : 0, 0.1);
  lastFrame = now;
  advanceMask(dt);
  if (playing) {
    t += dt * speedRate / BIN;
    const end = rangeSet ? loopB : B, start = rangeSet ? loopA : 0;
    if (t >= end) {
      if (loop) { t = start; snapScale = true; }
      else { t = end; setPlaying(false); }
    }
  }
  draw();
  drawTimeline();
  stats(now);
  updateRank(now);
  if (fpsEl.style.display === "block") {
    frames++;
    if (now - fpsT > 500) { fpsEl.textContent = `${Math.round(frames * 1000 / (now - fpsT))} fps · ${NF} flows`; frames = 0; fpsT = now; }
  }
  requestAnimationFrame(tick);
}

/* ---------- controls ---------- */
function setPlaying(p) {
  const end = rangeSet ? loopB : B, start = rangeSet ? loopA : 0;
  if (p && t >= end - 1e-9) { t = start; snapScale = true; }
  playing = p; $("play").textContent = p ? "⏸" : "▶";
}
$("play").addEventListener("click", () => setPlaying(!playing));
$("loop").addEventListener("change", e => { loop = e.target.checked; });
function buildSpeeds() {
  const span = B * BIN;
  const rates = [60, 120, 300, 600, 900, 1800, 3600, 10800, 21600, 43200, 86400, 259200]
    .filter(r => span / r >= 4 && (r >= 300 || span / r <= 1800));
  if (!rates.length) rates.push(Math.max(60, Math.round(span / 240)));
  const def = rates.reduce((a, b) =>
    Math.abs(span / b - 240) < Math.abs(span / a - 240) ? b : a);
  const sel = $("speed");
  sel.replaceChildren(...rates.map(r => {
    const o = document.createElement("option");
    o.value = r; o.textContent = fmtDur(r) + "/s";
    if (r === def) o.selected = true;
    return o;
  }));
  speedRate = def;
}
$("speed").addEventListener("change", e => { speedRate = +e.target.value; });
function seg(id, cb) {
  const el = $(id);
  el.addEventListener("click", ev => {
    const b = ev.target.closest("button"); if (!b) return;
    el.querySelectorAll("button").forEach(x => x.classList.toggle("on", x === b));
    cb(b);
  });
}
seg("metric", b => { metric = b.dataset.m; tlPath = null; snapScale = true; lastRank = 0; });
seg("mode", b => { mode = +b.dataset.mode; gradCache.clear(); snapScale = true; hover = null; });
seg("yscale", b => { yLog = b.dataset.y === "log"; tlPath = null; });
seg("fill", b => { ribbonStyle = b.dataset.f; });
seg("breathe", b => { breathe = +b.dataset.breathe; snapScale = true; });
seg("group", b => {
  buildModel(+b.dataset.g);
  resmooth();
  snapScale = true; hover = null; clearRank(); lastRank = 0; rebuildMask();
});
seg("ranktab", b => { rankTab = b.dataset.t; clearRank(); lastRank = 0; });
const winEl = $("win");
function winLabel() { $("winlabel").textContent = `±${fmtDur(radius * BIN)}`; }
winEl.value = radius;
let winTimer = null;
winEl.addEventListener("input", e => {
  radius = +e.target.value; winLabel();
  clearTimeout(winTimer);
  winTimer = setTimeout(() => { resmooth(); snapScale = true; }, 120);
});
const themes = ["auto", "light", "dark"];
let themeIdx = 0;
$("theme").addEventListener("click", () => {
  themeIdx = (themeIdx + 1) % 3;
  const v = themes[themeIdx];
  if (v === "auto") document.documentElement.removeAttribute("data-theme");
  else document.documentElement.setAttribute("data-theme", v);
  readTheme();
});
matchMedia("(prefers-color-scheme: dark)").addEventListener("change", readTheme);
/* timeline: drag = scrub · shift-drag = loop range · double-click = clear.
   The range COMMITS at pointerup - during the gesture it is provisional
   (drawn, but playback unconstrained), so a zero-width range at pointerdown
   can never pause playback mid-drag */
let scrubbing = false, rangeAnchor = null, pendA = 0, pendB = 0;
const binAt = ev => {
  const r = tlc.getBoundingClientRect();
  return Math.min(Math.max((ev.clientX - r.left) / r.width, 0), 1) * B;
};
tlc.addEventListener("pointerdown", ev => {
  tlc.setPointerCapture(ev.pointerId);
  if (ev.shiftKey) {
    rangeAnchor = binAt(ev);
    pendA = pendB = rangeAnchor;
  } else { scrubbing = true; t = binAt(ev); snapScale = true; }
});
tlc.addEventListener("pointermove", ev => {
  if (ev.buttons === 0) { scrubbing = false; rangeAnchor = null; return; }
  if (rangeAnchor !== null) {
    const b2 = binAt(ev);
    pendA = Math.min(rangeAnchor, b2); pendB = Math.max(rangeAnchor, b2);
  } else if (scrubbing) { t = binAt(ev); snapScale = true; }
});
tlc.addEventListener("pointerup", () => {
  scrubbing = false;
  if (rangeAnchor !== null) {
    rangeAnchor = null;
    if (pendB - pendA >= 0.5) {
      rangeSet = true; loopA = pendA; loopB = pendB;
      t = Math.min(Math.max(t, loopA), loopB); snapScale = true;
    }
  }
});
tlc.addEventListener("pointercancel", () => { scrubbing = false; rangeAnchor = null; });
tlc.addEventListener("dblclick", () => { rangeSet = false; });
document.addEventListener("keydown", ev => {
  if (ev.target.tagName === "SELECT" || ev.target.tagName === "INPUT") return;
  if (ev.code === "Space") { ev.preventDefault(); setPlaying(!playing); }
  else if (ev.key === "ArrowRight") { t = Math.min(t + B * 0.02, B); snapScale = true; }
  else if (ev.key === "ArrowLeft") { t = Math.max(t - B * 0.02, 0); snapScale = true; }
});

/* ---------- header meta + schema parametrization ---------- */
{
  const sample = M.file_sample || M.source || "graph source";
  const fileCount = Number.isInteger(M.file_count) ? M.file_count : (M.file_sample ? 1 : 0);
  const otherCount = Math.max(0, fileCount - 1);
  const source = otherCount
    ? `${sample} + ${otherCount} ${otherCount === 1 ? "other" : "others"}`
    : sample;
  $("meta-source").textContent = source;
  $("meta-source").title = source;
  const commonDir = M.common_dir || "";
  $("meta-source-dir").hidden = !commonDir;
  if (commonDir) {
    $("meta-source-dir").textContent = commonDir;
    $("meta-source-dir").title = commonDir;
  }
  $("meta-window-label").textContent = `window (${fmtDur(Math.round(M.t1 - M.t0))})`;
  $("meta-window-start").textContent = fmtStamp(M.t0);
  $("meta-window-end").textContent = fmtStamp(M.t1);
  $("meta-count").textContent = `${fmtN(M.rows)} ${M.rows_label || "conns"}`;
  const hasEntities = M.distinct_hosts != null;
  $("meta-entities-cell").hidden = !hasEntities;
  if (hasEntities) {
    const entityNoun = String(M.hosts_label || "hosts").replace(/\s+seen$/i, "").trim();
    $("meta-entities").textContent = entityNoun.toLowerCase() === "entities"
      ? fmtN(M.distinct_hosts)
      : `${fmtN(M.distinct_hosts)} ${entityNoun}`;
  }
  $("meta-bin").textContent = fmtDur(BIN);
  const hasDerivation = Boolean(M.metric_note);
  const hasDegrade = Boolean(M.degrade_note);
  const hasBandLoss = typeof M.band_loss_note === "string" && Boolean(M.band_loss_note);
  const hasStraddler = typeof M.straddler_note === "string" && Boolean(M.straddler_note);
  const hasClipLoss = typeof M.clip_loss_note === "string" && Boolean(M.clip_loss_note);
  $("meta-derivation-cell").hidden = !hasDerivation && !hasDegrade && !hasBandLoss && !hasStraddler && !hasClipLoss;
  $("meta-derivation-label").textContent = hasDerivation ? "derivation" : "note";
  $("meta-derivation").hidden = !hasDerivation;
  $("meta-degrade").hidden = !hasDegrade;
  $("meta-band-loss").hidden = !hasBandLoss;
  $("meta-straddler").hidden = !hasStraddler;
  $("meta-clip-loss").hidden = !hasClipLoss;
  if (hasDerivation) $("meta-derivation").textContent = M.metric_note;
  if (hasDegrade) $("meta-degrade").textContent = M.degrade_note;
  if (hasBandLoss) $("meta-band-loss").textContent = M.band_loss_note;
  if (hasStraddler) $("meta-straddler").textContent = M.straddler_note;
  if (hasClipLoss) $("meta-clip-loss").textContent = M.clip_loss_note;
  $("meta-kind").textContent = M.kind || "graph";
  $("meta-hunt-foot").hidden = !M.hunt_hint;
  if (M.mid_label) {
    $("modemid").textContent = "+" + M.mid_label;
    $("ranktab-mid").textContent = M.mid_label;
    $("k-svc").textContent = "top " + (M.mid_singular || M.mid_label);
  }
  if (M.hosts_label) $("k-hosts").textContent = M.hosts_label;
  if (M.single_metric || M.bands_active === true) {
    $("k-conns").textContent = M.rows_label || "events";
    $("k-cps").textContent = (M.rows_label || "events") + " / s";
  }
  if (M.single_metric) {
    metric = "c";
    $("metricgrp").style.display = "none";
    $("tile-rate").style.display = "none";
    $("tile-cum").style.display = "none";
  }
}

let copyRestoreTimer = null, copyAttempt = 0;
function legacyCopy(text) {
  const area = document.createElement("textarea");
  const active = document.activeElement;
  area.value = text;
  area.setAttribute("readonly", "");
  area.setAttribute("aria-hidden", "true");
  area.style.position = "fixed";
  area.style.left = "-10000px";
  area.style.top = "0";
  document.body.appendChild(area);
  area.focus(); area.select(); area.setSelectionRange(0, area.value.length);
  let copied = false;
  try { copied = Boolean(document.execCommand("copy")); } catch {}
  area.remove();
  if (active instanceof HTMLElement) active.focus();
  return copied;
}
async function copyHunt() {
  if (!M.hunt_hint) return;
  const attempt = ++copyAttempt;
  const button = $("copy-hunt");
  clearTimeout(copyRestoreTimer);
  let copied = false;
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(M.hunt_hint);
      copied = true;
    }
  } catch {}
  if (!copied) copied = legacyCopy(M.hunt_hint);
  if (attempt !== copyAttempt) return;
  button.textContent = copied ? "copied" : "copy failed";
  copyRestoreTimer = setTimeout(() => { button.textContent = "copy hunt"; }, 1400);
}
$("copy-hunt").addEventListener("click", copyHunt);

/* ---------- boot ---------- */
buildModel(32);
readTheme();
resize();
resmooth();
{
  const base = metric === "b" ? smTotB : smTotC;
  const nz = [...base].filter(v => v > 0).sort((a, b) => a - b);
  const med = nz.length ? nz[Math.floor(nz.length / 2)] : 1;
  yLog = peakRate[metric] / med > 40;
  $("yscale").querySelectorAll("button").forEach(b =>
    b.classList.toggle("on", (b.dataset.y === "log") === yLog));
}
buildSpeeds();
const naturalRadius = Math.max(6, Math.round(B / 12));
const radiusCap = Number.isInteger(M.max_radius) && M.max_radius >= 6
  ? M.max_radius : naturalRadius;
winEl.max = Math.min(naturalRadius, radiusCap);
winLabel();
rebuildMask();
setPlaying(playing);
requestAnimationFrame(tick);
</script>
</body>
</html>
