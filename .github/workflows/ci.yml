name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel a superseded run when new commits land on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: the suite only reads the repo.
permissions:
  contents: read

jobs:
  # JOB 1 - the must-have. Full extras (dev -> all -> cloudtrail/splunk/fast),
  # so the dependency-gated tests RUN instead of silently importorskip-ping.
  test:
    name: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Guard - gap-closing deps actually installed
        # If the recursive dev -> all extra ever breaks, the cloudtrail/splunk
        # tests would silently skip and the suite would still go green. Fail
        # loudly here instead.
        run: python -c "import botocore.exceptions, splunklib; print('cloudtrail + splunk deps present')"
      - name: Run full suite
        run: python -m pytest -ra

  # JOB 2 - proves the be-like-water optional-deps rail: a bare install yields a
  # working tool that DEGRADES (clean skips), not one that crashes.
  install-bare:
    name: install-bare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install bare (no extras) + pytest only
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Smoke - console entry point
        run: sigwood --help
      - name: Run suite - optional-dep tests must skip cleanly, rest pass
        run: python -m pytest -ra

  # JOB 3 - build the same wheel + sdist the manual release runbook publishes,
  # inspect their contents, then install the wheel outside the checkout. Editable
  # test installs cannot catch missing package data or an incomplete archive.
  distribution:
    name: distribution
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install packaging tools
        run: python -m pip install build twine
      - name: Build and inspect distributions
        run: |
          python -m build
          python -m twine check dist/*
          python scripts/validate_distribution.py dist
      - name: Install and smoke-test wheel outside the checkout
        run: |
          WHEEL="$(python -c 'from pathlib import Path; print(next(Path("dist").glob("*.whl")).resolve())')"
          VENV="$RUNNER_TEMP/sigwood-wheel-smoke"
          python -m venv "$VENV"
          "$VENV/bin/python" -m pip install "$WHEEL"
          "$VENV/bin/python" -m pip check
          cd "$RUNNER_TEMP"
          "$VENV/bin/sigwood" --version
          "$VENV/bin/sigwood" --help >/dev/null
          "$VENV/bin/python" -c "import importlib.resources as r; assert (r.files('sigwood') / 'data' / 'config_example.toml').is_file()"

  # JOB 4 - the WeasyPrint native stack is the flakiest part; keep CI green while
  # it stabilizes, promote to required later.
  pdf:
    name: pdf
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install WeasyPrint native stack
        # Pango/HarfBuzz/fontconfig + a base font. The package set shifts across
        # Ubuntu releases; see WeasyPrint's current Linux install docs.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libharfbuzz0b \
            libfontconfig1 \
            libffi-dev \
            fonts-dejavu-core
      - name: Install with pdf extra + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[pdf]"
          pip install pytest
      - name: Run pdf tests
        run: python -m pytest tests/test_pdf_output.py -ra
